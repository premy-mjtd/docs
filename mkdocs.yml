site_name: Whaleden Docs
site_url: https://docs.whaleden.com

extra:
  generator: false

theme:
  name: material
  logo: assets/image.avif
  palette:
    scheme: slate
    primary: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Whalecome: index.md
  - Official Links: official-links.md
  - How To:
      - Create an Account: how-to/create-an-account.md
      - Link a Wallet: how-to/link-a-wallet.md
  - Stories:
      - Comic Pitch: stories/comic-pitch.md
      - Comics: stories/comics.md
  - Documents:
      - Whitepaper: documents/whitepaper.md
      - Tokenomics: documents/tokenomics.md
