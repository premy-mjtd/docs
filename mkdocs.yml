site_name: Whaleden Docs
site_url: https://docs.whaleden.com

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Whalecome: index.md
  - Official Links: official-links.md
  - How To:
    - Create an Account: how-to/create-an-account.md
    - Link a Wallet: how-to/link-a-wallet.md
  - Stories:
    - Comic Pitch: stories/comic-pitch.md
    - Comics: stories/comics.md
  - Documents:
    - Whitepaper: documents/whitepaper.md
    - Tokenomics: documents/tokenomics.md
